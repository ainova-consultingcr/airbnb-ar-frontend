function pickBestVoice(targetLang) {

  const voices = speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;

  const langPrefix = targetLang.split("-")[0]; // es / en

  // palabras comunes en voces femeninas
  const femaleHints = [
    "female",
    "woman",
    "zira",
    "sabina",
    "helena",
    "sofia",
    "paulina",
    "lucia",
    "maria"
  ];

  // 1️⃣ buscar voz femenina del idioma
  let voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix) &&
    femaleHints.some(h => v.name.toLowerCase().includes(h))
  );

  if (voice) return voice;

  // 2️⃣ fallback: cualquier voz del idioma
  voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix)
  );

  if (voice) return voice;

  // 3️⃣ fallback total
  return voices[0] || null;
}



function hideSuggestions() {
  const container = document.getElementById("suggestions");
  if (container) {
    container.style.display = "none";
  }
}

function showSuggestions() {
  const container = document.getElementById("suggestions");

  if (container && BACKEND_SUGGESTIONS) {
    renderSuggestionsFromBackend(); // 🔥 clave
    container.style.display = "flex";
  }
}

 

function normalizeLang(lang) {
  if (!lang) return "es-ES";
  lang = lang.toLowerCase();

  if (lang.startsWith("es")) return "es-ES";
  if (lang.startsWith("en")) return "en-US";

  // fallback
  return "es-ES";
}


function speak(text) {
  if (!text) return;

  // Cancelar lo anterior
  speechSynthesis.cancel();

  // Idioma según tu CURRENT_LANG detectado
  const targetLang = normalizeLang(CURRENT_LANG);
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = targetLang;

  const voice = pickBestVoice(targetLang);
  if (voice) utterance.voice = voice;

  utterance.rate = 0.95;
  utterance.pitch = 1;
  utterance.volume = 1;

    // 🔥 CUANDO TERMINA EL AUDIO
  utterance.onend = () => {
    closePanel(3000); // 👈 buffer elegante de 3s
  };

  speechSynthesis.speak(utterance);
}

function closePanel(delay = 0) {
 if (hideTimer) clearTimeout(hideTimer);

  hideTimer = setTimeout(() => {
    showSuggestions();

  }, delay);
}

function showARAnswer(text, speakAudio = true) {
  const responseCard = document.getElementById("responseCard");
  const responseText = document.getElementById("responseText");
  const responseLoading = document.getElementById("responseLoading");
  const responseLabel = document.getElementById("responseLabel");

  if (!responseCard || !responseText) return;

  const finalText = String(text || "").normalize("NFC");
  responseText.textContent = finalText;
  responseText.scrollTop = 0;
  responseLoading?.classList.remove("visible");
  responseText.style.display = "block";
  responseCard.classList.add("visible");
  if (responseLabel) {
    responseLabel.textContent = CURRENT_LANG.startsWith("en")
      ? "AVI answers"
      : "AVI responde";
  }
  hideSuggestions();

  // audio
  if (speakAudio) {
    speak(text);
  }

  if (hideTimer) clearTimeout(hideTimer);

  if (!speakAudio) {
    clearCTAs();
    closePanel(6000);
  }

}
function typeWriterEffect(element, text, speed = 40) {

  const words = text.split(" ");
  let i = 0;
  let current = "";

  function typing() {

    if (i < words.length) {

      current += (i === 0 ? "" : " ") + words[i];

      element.setAttribute("troika-text", {
        value: current
      });

      i++;

      setTimeout(typing, speed);
    }

  }

  typing();

}

function sendReservation(item) {
  const name = document.getElementById("resName").value;
  const date = document.getElementById("resDate").value;
  const time = document.getElementById("resTime").value;
  const people = document.getElementById("resPeople").value;

  const msg = `Hola, quiero reservar en ${item.name}
  Código AVI: ${item.lead_id}

    Nombre: ${name}
    Fecha: ${date}
    Hora: ${time}
    Personas: ${people}`;

  trackLeadEvent(
   "reservation_sent",
   item.type || "service",
   item.name,
   item.lead_id,
    {
      date,
      time,
      people
    }
  );
  window.open(`https://wa.me/${item.whatsapp}?text=${encodeURIComponent(msg)}`);
}

function openExternalUrl(url) {
  if (!url) return;

  try {
    const parsed = new URL(url);
    if (parsed.protocol !== "https:") return;
    window.open(parsed.href, "_blank", "noopener,noreferrer");
  } catch (error) {
    console.warn("URL inválida:", url);
  }
}

function reserveRestaurant(restaurant) {
  if (!restaurant?.whatsapp) return;

  const langKey = CURRENT_LANG.startsWith("en") ? "en" : "es";
  const message = langKey === "en"
    ? `Hello, I would like to book a table at ${restaurant.name}. AVI code: ${restaurant.lead_id || "N/A"}`
    : `Hola, quiero reservar una mesa en ${restaurant.name}. Código AVI: ${restaurant.lead_id || "N/A"}`;

  trackLeadEvent(
    "reservation_started",
    "restaurant",
    restaurant.name,
    restaurant.lead_id
  );

  const phone = String(restaurant.whatsapp).replace(/\D/g, "");
  openExternalUrl(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}
