  <style>
    :root {

      --avi-accent-text: #15240d;

      --safe-bottom: max(14px, env(safe-area-inset-bottom));
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background: #05080f;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(180deg, rgba(3, 7, 18, 0.66) 0%, transparent 28%),
        linear-gradient(0deg, rgba(3, 7, 18, 0.84) 0%, transparent 48%);
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: 0;
      content: "";
      background:
        radial-gradient(circle at 14% 16%, color-mix(in srgb, var(--avi-accent) 22%, transparent), transparent 30%),
        radial-gradient(circle at 88% 82%, rgba(35, 99, 135, 0.22), transparent 34%),
        linear-gradient(145deg, #08111e 0%, #040914 48%, #07121a 100%);
    }

    body.auto-parts-bg::before {
      background:
        radial-gradient(circle at 78% 22%, rgba(245, 158, 11, 0.24), transparent 20%),
        radial-gradient(circle at 16% 82%, rgba(234, 88, 12, 0.2), transparent 24%),
        radial-gradient(circle at 84% 78%, rgba(148, 163, 184, 0.13) 0 9%, transparent 10% 14%, rgba(148, 163, 184, 0.09) 15% 18%, transparent 19%),
        radial-gradient(circle at 18% 26%, rgba(148, 163, 184, 0.12) 0 8%, transparent 9% 13%, rgba(148, 163, 184, 0.08) 14% 17%, transparent 18%),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 12px),
        linear-gradient(145deg, #090d12 0%, #15100a 42%, #05070b 100%);
    }

    body.auto-parts-bg::after {
      background:
        linear-gradient(180deg, rgba(3, 7, 18, 0.58) 0%, transparent 30%),

    input {

      background: var(--avi-accent);

      animation-delay: 160ms;
    }

    .loading-dot:nth-child(3) {
      animation-delay: 320ms;

      scroll-snap-align: start;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    /* Evita el pintado parcial de tarjetas altas durante el scroll en iOS. */
    .tourist-place-list,
    .business-place-list {
      -webkit-transform: translate3d(0, 0, 0);
      transform: translate3d(0, 0, 0);
      will-change: scroll-position;
    }

    .tourist-card,
    .business-card {
      -webkit-backface-visibility: hidden;

      -webkit-transform: translate3d(0, 0, 0);
      transform: translate3d(0, 0, 0);
      will-change: transform;

      color: var(--avi-accent);
      font-size: 11px;
      font-weight: 800;

      line-height: 1.2;
    }

      width: 100%;
      min-width: 0;
      height: 42px;

function localizedValue(value, fallback = "") {
  const langKey = CURRENT_LANG.startsWith("en") ? "en" : "es";
  if (value && typeof value === "object" && !Array.isArray(value)) {
    return value[langKey] || value.es || value.en || fallback;
  }
  return value || fallback;
}

function setLastActionContext(actionType, topic, item = {}, options = []) {
  activeConversationContext = {
    type: "last_action",
    action_type: actionType,
    topic,
    item,
    options: Array.isArray(options) ? options.slice(0, 5) : []
  };
}

function isContinuationReply(text) {
  const normalized = (text || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
  return [
    "si",
    "si quiero",
    "si algo mas",
    "algo mas",
    "mas",
    "mas informacion",
    "otra opcion",
    "otra cosa",
    "ok",
    "okay",
    "dale",
    "claro",
    "correcto",
    "quiero",
    "quiero ayuda",
    "ayuda",
    "ayudame",
    "me interesa",
    "reservar",
    "reserva",
    "quiero reservar",
    "yes",
    "yes please",
    "more",
    "more info",
    "something else",
    "yeah",
    "yep",
    "sure",
    "help me"
  ].includes(normalized);
}

function isNegativeReply(text) {
  const normalized = (text || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
  return [
    "no",
    "no gracias",
    "gracias no",
    "por ahora no",
    "ahora no",
    "no thanks",
    "not now"
  ].includes(normalized);
}

function getConversationContextForQuestion(question) {
  if (!activeConversationContext) return {};
  if (activeConversationContext.type === "auto_parts_search") {
    if (isContinuationReply(question) || isNegativeReply(question)) return activeConversationContext;
    const normalizedQuestion = (question || "").toLowerCase();
    const vehicle = activeConversationContext.vehicle || {};
    const part = activeConversationContext.part || {};
    const signals = [
      vehicle.make,
      vehicle.model,
      vehicle.year,
      part.name,
      part.category,
      part.sku
    ].filter(Boolean).map((value) => String(value).toLowerCase());
    return signals.some((signal) => normalizedQuestion.includes(signal))
      ? activeConversationContext
      : {};
  }
  if (activeConversationContext.type === "hardware_search") {
    if (isContinuationReply(question) || isNegativeReply(question)) return activeConversationContext;
    const normalizedQuestion = (question || "").toLowerCase();
    const item = activeConversationContext.item || {};
    const signals = [
      item.name,
      item.category,
      item.sku,
      item.aisle,
      activeConversationContext.topic
    ].filter(Boolean).map((value) => String(value).toLowerCase());
    return signals.some((signal) => normalizedQuestion.includes(signal))
      ? activeConversationContext
      : {};
  }
  if (activeConversationContext.type === "wellness_profile") {
    if (isContinuationReply(question) || isNegativeReply(question)) return activeConversationContext;
    const normalizedQuestion = (question || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
    const profile = activeConversationContext.profile || {};
    const signals = [
      profile.goal,
      profile.activity_level,
      profile.diet_style,
      profile.budget,
      ...(activeConversationContext.options || []).map((item) => item.name)
    ].filter(Boolean).map((value) => String(value).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
    return signals.some((signal) => normalizedQuestion.includes(signal))
      ? activeConversationContext
      : {};
  }
  return (isContinuationReply(question) || isNegativeReply(question)) ? activeConversationContext : {};
}

function setContextFromResponseData(data, originalQuestion = "") {
  if (data?.cta_options?.length) {
    const option = data.cta_options[0];
    setLastActionContext(
      option.type || "cta",
      localizedValue(option.text, "accion disponible"),
      option.data || option,
      data.cta_options.map((item) => item.data || item)
    );
    return;
  }
  if (data?.restaurant_options?.length) {
    setLastActionContext("restaurants", "restaurantes", data.restaurant_options[0], data.restaurant_options);
    return;
  }
  if (data?.business_options?.length) {
    setLastActionContext("nearby_businesses", "servicios cercanos", data.business_options[0], data.business_options);
    return;
  }
  if (data?.place_options?.length) {
    setLastActionContext("tourist_places", "lugares turisticos", data.place_options[0], data.place_options);
    return;
  }
  if (data?.answer && originalQuestion && !isContinuationReply(originalQuestion) && !isNegativeReply(originalQuestion)) {
    setLastActionContext(
      "general_answer",
      originalQuestion,
      {
        name: originalQuestion,
        summary: {
          es: data.answer,
          en: data.answer
        }
      },
      []
    );
  }
}

function getCompatibleGuidedParts() {
  const make = document.getElementById("vehicleMakeSelect")?.value;
  const model = document.getElementById("vehicleModelSelect")?.value;
  const year = Number(document.getElementById("vehicleYearSelect")?.value);
  const category = document.getElementById("partCategorySelect")?.value;
  const catalog = PROPERTY_CONFIG?.auto_parts?.catalog || [];

  return catalog.filter((part) => {
    if (category && part.category !== category) return false;
    if (!make || !model || !year) return true;

    return (part.vehicle_fitment || []).some((fitment) => {
      const universal = String(fitment.make).toLowerCase() === "universal";
      const sameVehicle = fitment.make === make && fitment.model === model;
      const inYear = year >= fitment.year_from && year <= fitment.year_to;
      return (universal || sameVehicle) && inYear;
    });
  });
}

function buildGuidedPartsConversationContext(make, model, year, category, partLabel) {
  const catalog = PROPERTY_CONFIG?.auto_parts?.catalog || [];
  const selectedPart = catalog.find((item) => item.name === partLabel) || {};
  const effectiveCategory = selectedPart.category || category || partLabel;
  const offers = (PROPERTY_CONFIG?.auto_parts?.offers || []).filter((offer) => {
    if (!offer.active) return false;
    if (!effectiveCategory) return true;
    return (offer.categories || []).includes(effectiveCategory);
  });

  return {
    type: "auto_parts_search",
    vehicle: { make, model, year },
    part: {
      name: selectedPart.name || (partLabel === "otro repuesto" ? "" : partLabel),
      category: effectiveCategory,
      sku: selectedPart.sku || "",
      related_parts: selectedPart.related_parts || []
    },
    offers
  };
}

function buildHardwareConversationContext(project, category, item) {
  const section = (PROPERTY_CONFIG?.hardware?.store_sections || []).find((entry) => entry.id === category);
  const offers = (PROPERTY_CONFIG?.hardware?.offers || []).filter((offer) => {
    if (!offer.active) return false;
    return !category || (offer.categories || []).includes(category);
  });
  const workshops = (PROPERTY_CONFIG?.hardware?.workshops || []).filter((workshop) => {
    return !category || workshop.category === category;
  });

  return {
    type: "hardware_search",
    action_type: "hardware_search",
    topic: category ? getHardwareCategoryLabel(category, CURRENT_LANG.startsWith("en") ? "en" : "es") : "ferreteria",
    item: item || {
      name: project || getHardwareCategoryLabel(category, CURRENT_LANG.startsWith("en") ? "en" : "es"),
      category,
      aisle: section?.aisle || ""
    },
    options: [
      ...(item ? [item] : getCompatibleHardwareItems()),
      ...offers,
      ...workshops
    ].slice(0, 5)
  };
}

function inferWellnessShortcut(text) {
  const normalized = (text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");

  if (normalized.includes("bajar") || normalized.includes("peso") || normalized.includes("weight")) {
    return { goal: "weight_support" };
  }
  if (normalized.includes("energia") || normalized.includes("energy")) {
    return { goal: "energy" };
  }
  if (normalized.includes("entren") || normalized.includes("workout") || normalized.includes("exercise")) {
    return { goal: "workout_support" };
  }
  if (normalized.includes("piel") || normalized.includes("cabello") || normalized.includes("unas") || normalized.includes("skin") || normalized.includes("hair") || normalized.includes("nail")) {
    return { goal: "skin_hair_nails" };
  }
  if (normalized.includes("presupuesto") || normalized.includes("budget")) {
    return { budget: "under_35" };
  }
  return null;
}

function pickBestVoice(targetLang) {

  const voices = speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;

  const langPrefix = targetLang.split("-")[0]; // es / en

  // palabras comunes en voces femeninas
  const femaleHints = [
    "female",
    "woman",
    "zira",
    "sabina",
    "helena",
    "sofia",
    "paulina",
    "lucia",
    "maria"
  ];

  // 1ÃƒÂ¯Ã‚Â¸Ã‚ÂÃƒÂ¢Ã†â€™Ã‚Â£ buscar voz femenina del idioma
  let voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix) &&
    femaleHints.some(h => v.name.toLowerCase().includes(h))
  );

  if (voice) return voice;

  // 2ÃƒÂ¯Ã‚Â¸Ã‚ÂÃƒÂ¢Ã†â€™Ã‚Â£ fallback: cualquier voz del idioma
  voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix)
  );

  if (voice) return voice;

  // 3ÃƒÂ¯Ã‚Â¸Ã‚ÂÃƒÂ¢Ã†â€™Ã‚Â£ fallback total
  return voices[0] || null;
}

function normalizeLang(lang) {
  if (!lang) return "es-ES";
  lang = lang.toLowerCase();

  if (lang.startsWith("es")) return "es-ES";
  if (lang.startsWith("en")) return "en-US";

  // fallback
  return "es-ES";
}


function speak(text) {
  if (!text) return;

  // Cancelar lo anterior
  speechSynthesis.cancel();

  // Idioma segÃƒÆ’Ã‚Âºn tu CURRENT_LANG detectado
  const targetLang = normalizeLang(CURRENT_LANG);
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = targetLang;

  const voice = pickBestVoice(targetLang);
  if (voice) utterance.voice = voice;

  utterance.rate = 0.95;
  utterance.pitch = 1;
  utterance.volume = 1;

    // ÃƒÂ°Ã…Â¸Ã¢â‚¬ÂÃ‚Â¥ CUANDO TERMINA EL AUDIO
  utterance.onend = () => {
    closePanel(3000); // ÃƒÂ°Ã…Â¸Ã¢â‚¬ËœÃ‹â€  buffer elegante de 3s
  };

  speechSynthesis.speak(utterance);
}

function typeWriterEffect(element, text, speed = 40) {

  const words = text.split(" ");
  let i = 0;
  let current = "";

  function typing() {

    if (i < words.length) {

      current += (i === 0 ? "" : " ") + words[i];

      element.setAttribute("troika-text", {
        value: current
      });

      i++;

      setTimeout(typing, speed);
    }

  }

  typing();

}

function openExternalUrl(url) {
  if (!url) return;

  try {

    window.open(parsed.href, "_blank", "noopener,noreferrer");

  }
}
