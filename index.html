<html lang="es">
<head>

 <!-- VERSION: FIX-PROPERTY-08/01/2025 4:31 pm-OK -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <title>Airbnb AR Assistant</title>

  <!-- A-Frame -->

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      
    }

    a-scene {
      position: fixed;
      inset: 0;
      z-index: 1;
      
    }

    /* 🔥 UI ENCIMA DEL AR */
    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 12px;
    }

    #ui input {
      width: 220px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    #ui button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #00c853;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
    }
    #suggestions {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 92vw;
  padding: 6px 10px;
}

.suggestion-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: white;
  padding: 8px 10px;
  border-radius: 999px;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
}

.suggestion-btn:active {
  transform: scale(0.97);
}
  </style>
</head>

<body>

  <!-- ESCENA AR -->
<a-scene
  embedded
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false;"
  device-orientation-permission-ui="enabled: false"
  cursor="rayOrigin: mouse"
>

  <a-camera position="0 0 0" look-controls="enabled: false">

  <a-entity
    id="arFloat"
    position="0 0 -2"
    animation="property: position;
               dir: alternate;
               dur: 3000;
               easing: easeInOutSine;
               loop: true;
               to: 0 0.12 -2">

    <a-entity id="arPanel" scale="0 0 0">

      <a-plane
        id="arPlane"
        width="2.2"
        height="1.2"
        color="#0b1220"
        opacity="0.62"
        material="shader: flat; transparent: true"
        >
      </a-plane>
      <a-plane
        width="1.9"
        height="1.1"
        color="#ffffff"
        opacity="0.12"
        position="0 0 -0.01"
        material="shader: flat; transparent: true"
        ></a-plane>
        <a-text
        id="arTitle"
        value=""
        width="1.4"
        color="#ffffff"
        align="center"
        position="0 0.50 0.15"
        scale="0.85 0.85 0.85"
        anchor="center">
      </a-text>
        <a-entity
    id="arText"
    troika-text="
    value: ;
    align: center;
    color: #e5e7eb;
    maxWidth: 1.6;
    fontSize: 0.065;
    overflowWrap: break-word;
    lineHeight: 1.05;
     letterSpacing: 0.02;
    whiteSpace: normal;
  "
  position="0 -0.03 0.15">
</a-entity>
<a-ring
  id="arLoader"
  radius-inner="0.05"
  radius-outer="0.08"
  position="0 -0.25 0.1"
  rotation="0 0 0"
  theta-start="20"
  theta-length="280"
  color="#ffffff"
  visible="false"
  animation="property: rotation; to: 0 0 360; loop: true; dur: 700; easing: linear"
></a-ring>
    </a-entity>

  </a-entity>
</a-camera>
</a-scene>
  <!-- 🔥 UI HTML -->
  <div id="ui">
    <input
      id="questionInput"
      placeholder="Ej: ¿A qué hora es el check-in?"
    />
  
    <button id="sendBtn" onclick="askAI()">Enviar</button>
  </div>
  
  <script>

  function getLanguageFromURL() {
    const params = new URLSearchParams(window.location.search);
    const property = params.get("property");
    return params.get("lang");
  }

  function getBrowserLanguage() {
    return navigator.language || navigator.userLanguage || "es-ES";
  }

  function getCurrentLanguage() {
    return getLanguageFromURL() || getBrowserLanguage();
  }

  const CURRENT_LANG = getCurrentLanguage();
</script>

<script>
  let BACKEND_SUGGESTIONS = null;
  let PROPERTY_CONFIG = null;

  async function loadPropertyConfig() {
  try {
    //const res = await fetch("https://gayla-subcalibre-destiny.ngrok-free.dev/property?property_id=" + CURRENT_PROPERTY)
    //const res = await fetch("http://localhost:8000/property?property_id=" + CURRENT_PROPERTY)
    const res = await fetch(
      "https://airbnb-ar-assistant.onrender.com/property?property_id=" + CURRENT_PROPERTY
    );
    //const res = await fetch(`http://localhost:8000/data?property=${entity}`)
    const data = await res.json();

    // mapear a formato actual
    PROPERTY_CONFIG = data;
   
  } catch (err) {
    console.error("Error cargando config:", err);
  }
}

  function getPropertyFromURL() {
  const params = new URLSearchParams(window.location.search);
  const entity = params.get("entity") || params.get("property");
  //return params.get("entity") || "hotel_demo";
  return entity || "hotel_demo";
}

const CURRENT_PROPERTY = getPropertyFromURL();

</script>

  <script>
  let hideTimer = null;
  let currentUtterance = null;
  let audioUnlocked = false;
  

   function unlockAudio() {
    if (audioUnlocked) return;
    speechSynthesis.getVoices();
    const silent = new SpeechSynthesisUtterance("");
    silent.volume = 0;
    window.speechSynthesis.speak(silent);

  audioUnlocked = true;
}
  function applyBranding(playAudio = false) {

console.log("CONFIG COMPLETO:", PROPERTY_CONFIG);
console.log("WELCOME:", PROPERTY_CONFIG?.welcome);
console.log("THEME:", PROPERTY_CONFIG?.theme);

  const panel = document.getElementById("arPanel");
  const plane = document.getElementById("arPlane");
  const text = document.getElementById("arText");
  const btn = document.getElementById("sendBtn");

  if (!panel || !plane || !text) return;
 
 const theme = PROPERTY_CONFIG.theme || UI_THEME;

  plane.setAttribute("color", theme.panel);
  plane.setAttribute("opacity", "0.72");

  if (btn) {
    btn.style.background = theme.button;
    btn.style.color = theme.buttonText;
  }
 
  const config = PROPERTY_CONFIG;
  console.log(Object.keys(PROPERTY_CONFIG));
  if (!config) return;

  
  panel.setAttribute("scale", "1 1 1");
  panel.setAttribute("visible", "true");

  const langKey = CURRENT_LANG.startsWith("en") ? "en" : "es";
  showARAnswer(config.welcome[langKey], playAudio);
}
function applyTitleBranding() {

  const title = document.getElementById("arTitle");
  const config = PROPERTY_CONFIG;
    
  if (!title || !config) return;

  title.setAttribute("value", config.name);
}

function pickBestVoice(targetLang) {

  const voices = speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;

  const langPrefix = targetLang.split("-")[0]; // es / en

  // palabras comunes en voces femeninas
  const femaleHints = [
    "female",
    "woman",
    "zira",
    "sabina",
    "helena",
    "sofia",
    "paulina",
    "lucia",
    "maria"
  ];

  // 1️⃣ buscar voz femenina del idioma
  let voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix) &&
    femaleHints.some(h => v.name.toLowerCase().includes(h))
  );

  if (voice) return voice;

  // 2️⃣ fallback: cualquier voz del idioma
  voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix)
  );

  if (voice) return voice;

  // 3️⃣ fallback total
  return voices[0] || null;
}



function hideSuggestions() {
  const container = document.getElementById("suggestions");
  if (container) {
    container.style.display = "none";
  }
}

function showSuggestions() {
  const container = document.getElementById("suggestions");
  if (container && BACKEND_SUGGESTIONS) {
    container.style.display = "flex";
  }
}

 

function normalizeLang(lang) {
  if (!lang) return "es-ES";
  lang = lang.toLowerCase();

  if (lang.startsWith("es")) return "es-ES";
  if (lang.startsWith("en")) return "en-US";

  // fallback
  return "es-ES";
}


function speak(text) {
  if (!text) return;

  // Cancelar lo anterior
  speechSynthesis.cancel();

  // Idioma según tu CURRENT_LANG detectado
  const targetLang = normalizeLang(CURRENT_LANG);
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = targetLang;

  const voice = pickBestVoice(targetLang);
  if (voice) utterance.voice = voice;

  utterance.rate = 0.95;
  utterance.pitch = 1;
  utterance.volume = 1;

    // 🔥 CUANDO TERMINA EL AUDIO
  utterance.onend = () => {
    closePanel(1500); // 👈 buffer elegante de 1.5s
  };

  speechSynthesis.speak(utterance);
}

function closePanel(delay = 0) {
 if (hideTimer) clearTimeout(hideTimer);

  hideTimer = setTimeout(() => {
    const panel = document.getElementById("arPanel");
    if (panel) {
      //panel.setAttribute("scale", "0 0 0");
      panel.setAttribute("opacity", "0.35");
      showSuggestions();
    }
  
  }, delay);
}

function showARAnswer(text, speakAudio = true) {

    // asegurar que es string
  text = String(text || "");
  // normalizar unicode (corrige tildes combinadas)
  text = text.normalize("NFC");
  // reconstruir caracteres correctamente
  text = Array.from(text).join("");

  const panel = document.getElementById("arPanel");
  const arText = document.getElementById("arText");

  if (!panel || !arText) return;

  const MAX_LENGTH = 260;

  let finalText = String(text || "");

  // evitar cortar palabras a la mitad
  if (finalText.length > MAX_LENGTH) {

    finalText = finalText.slice(0, MAX_LENGTH);

    const lastSpace = finalText.lastIndexOf(" ");

    if (lastSpace > 0) {
      finalText = finalText.slice(0, lastSpace);
    }

    finalText += "...";
  }


  arText.setAttribute("troika-text", "value", "");
  // pequeño delay para asegurar render
  setTimeout(() => {
    console.log("TEXTO ORIGINAL:", text);
    console.log("FINAL TEXT:", finalText);
  
    arText.setAttribute("troika-text", {
      value: finalText
    });
   
  }, 80);

  // mostrar panel
  panel.setAttribute("scale", "1 1 1");
  panel.setAttribute("opacity", "1");
  panel.setAttribute("visible", "true");

  panel.setAttribute("animation__pop", {
    property: "scale",
    from: "0.9 0.9 0.9",
    to: "1 1 1",
    dur: 260,
    easing: "easeOutBack"
  });

  hideSuggestions();

  // audio
  if (speakAudio) {
    speak(text);
  }

  if (hideTimer) clearTimeout(hideTimer);

  if (!speakAudio) {
    closePanel(6000);
  }

}
function typeWriterEffect(element, text, speed = 40) {

  const words = text.split(" ");
  let i = 0;
  let current = "";

  function typing() {

    if (i < words.length) {

      current += (i === 0 ? "" : " ") + words[i];

      element.setAttribute("troika-text", {
        value: current
      });

      i++;

      setTimeout(typing, speed);
    }

  }

  typing();

}
function applyInputBranding() {

  const input = document.getElementById("questionInput");
  const textButton = document.getElementById("sendBtn");
  //const config = PROPERTY_CONFIG[CURRENT_PROPERTY];
  const config = PROPERTY_CONFIG;
  const ui = config.ui || {};

  if (!input || !config) return;

  const isEN = CURRENT_LANG.startsWith("en");
  const langKey = isEN ? "en" : "es";
input.placeholder =
  ui.input_placeholder?.[langKey]?.replace("{name}", config.name) ||
  (isEN
    ? `Ask something at ${config.name}...`
    : `Pregunta algo en ${config.name}...`);
    if (textButton) {
  textButton.textContent =
    ui.send_button?.[langKey] || (isEN ? "Send" : "Enviar");
}
}
function showLoader() {
  const panel = document.getElementById("arPanel");
  const arText = document.getElementById("arText");
  const loader = document.getElementById("arLoader");

  if (panel) {
    panel.setAttribute("scale", "1 1 1");
    panel.setAttribute("visible", "true");
    panel.setAttribute("animation__pop", {
    property: "scale",
    from: "0.9 0.9 0.9",
    to: "1 1 1",
    dur: 260,
    easing: "easeOutBack"
  });

  }

  if (arText) {
    arText.setAttribute("troika-text", "");
    
  }

  if (loader) {
    const theme = PROPERTY_CONFIG?.theme || {};
    loader.setAttribute("color", theme.spinner || "#94a3b8");
    loader.setAttribute("visible", "true");
  }
}

function hideLoader() {
  const loader = document.getElementById("arLoader");
  if (loader) loader.setAttribute("visible", "false");
}


 function setLoading(isLoading) {
  const btn = document.getElementById("sendBtn");
  const input = document.getElementById("questionInput");

  const isEN = CURRENT_LANG.startsWith("en");

  if (btn) {
    btn.disabled = isLoading;
    btn.textContent = isLoading ? "..." : (isEN ? "Send" : "Enviar");
  }

  if (input) {
    input.disabled = isLoading;
  }
}


function renderSuggestions() {
  const container = document.getElementById("suggestions");
  if (!container || !BACKEND_SUGGESTIONS) return;

  const langKey = CURRENT_LANG.startsWith("en") ? "en" : "es";
  const list = BACKEND_SUGGESTIONS[langKey] || [];

  container.innerHTML = "";

  list.forEach((q) => {
    const btn = document.createElement("button");
    btn.className = "suggestion-btn";
    btn.textContent = q;

    btn.onclick = () => {
      const input = document.getElementById("questionInput");
      if (input) input.value = q;
      askAI();
    };

    container.appendChild(btn);
  });
}

function renderSuggestionsFromBackend() {
  const container = document.getElementById("suggestions");
  if (!container || !BACKEND_SUGGESTIONS) return;

  const langKey = CURRENT_LANG.startsWith("en") ? "en" : "es";
  const list = BACKEND_SUGGESTIONS[langKey] || [];

  container.innerHTML = "";

  list.forEach((q) => {
    const btn = document.createElement("button");
    btn.className = "suggestion-btn";
    btn.textContent = q;

    btn.onclick = () => {
      const input = document.getElementById("questionInput");
      if (input) input.value = q;
      askAI();
    };

    container.appendChild(btn);
  });
}
function showThinking() {
  const arText = document.getElementById("arText");
  if (!arText || !PROPERTY_CONFIG) return;

  const langKey = CURRENT_LANG.startsWith("en") ? "en" : "es";

  const text =
    PROPERTY_CONFIG.messages?.thinking?.[langKey] ||
    "🤖 ...";

  arText.setAttribute("troika-text", {
    value: text
  });
}

async function askAI() {
  
  showThinking();
  unlockAudio();

  const input = document.getElementById("questionInput");
  if (!input || !input.value.trim()) return;

  const question = input.value.trim();

  try {
    setLoading(true);

    // UX: feedback inmediato
    showLoader();
    //("⏳ Pensando...", false);

    const res = await fetch(
     "https://airbnb-ar-assistant.onrender.com/ask",
    //"https://gayla-subcalibre-destiny.ngrok-free.dev/ask",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          property_id: CURRENT_PROPERTY,
          question: question,
          //language: CURRENT_LANG
          language: CURRENT_LANG.startsWith("en") ? "en" : "es"
        })
      }
    );
    // Si backend respondió error
    if (!res.ok) {
      let detail = "";
       hideLoader();
      try {
        const err = await res.json();
        detail = err?.detail ? ` (${err.detail})` : "";
      } catch (e) {}

      /*showARAnswer(ui.errors?.server?.[langKey], false);
      return;*/
      const errors = PROPERTY_CONFIG?.messages?.errors || {};
      const langKey = CURRENT_LANG.startsWith("en") ? "en" : "es";

  showARAnswer(
  errors.server?.[langKey] || "⚠️ Server error",
  false
);
    }

    const data = await res.json();
    if (data.suggestions) {

  BACKEND_SUGGESTIONS = data.suggestions;
  renderSuggestionsFromBackend();
}

   const answer = data?.answer;

hideLoader();

if (!answer) {
  showARAnswer("⚠️ Respuesta vacía. Intenta otra vez.", false);
  return;
}

showARAnswer(answer, true);
input.value = "";


  } catch (err) {
    console.error("Fetch error:", err);
    hideLoader();
   
    const ui = PROPERTY_CONFIG.ui || {};
    const langKey = CURRENT_LANG.startsWith("en") ? "en" : "es";

  showARAnswer(
  ui.errors?.network?.[langKey] ||
  "⚠️ Error de red. Revisa tu conexión.",
  false
);


  } finally {
    setLoading(false);
  }
 
}

speechSynthesis.onvoiceschanged = () => {
  console.log("✅ Voces cargadas:", speechSynthesis.getVoices().length);
};
  
  </script>
  <script>
    const input = document.getElementById("questionInput");
    const scene = document.querySelector("a-scene");

    input.addEventListener("focus", () => {
      scene.style.visibility = "hidden";
      scene.style.pointerEvents = "none";
    });

    input.addEventListener("blur", () => {
       scene.style.visibility = "visible";
       scene.style.pointerEvents = "auto";
    });
</script>

<script>
const sceneTest = document.querySelector("a-scene");

sceneTest.addEventListener("loaded", async () => {

  await loadPropertyConfig();
   applyBranding(false);
  applyInputBranding();
  //applyTitleBranding();

  setTimeout(() => {
  renderSuggestionsFromBackend();
}, 300);

  // 🔹 Cargar suggestions al iniciar (llamada silenciosa)
  try {
    const res = await fetch(
     "https://airbnb-ar-assistant.onrender.com/ask",

      {
        method: "POST",
        headers: { "Content-Type": "application/json" },

          property_id: CURRENT_PROPERTY,
          question: "init",
          language: CURRENT_LANG.startsWith("en") ? "en" : "es"
        })
      }
    );

    if (!res.ok) return;

    const data = await res.json();

    if (data.suggestions) {
      BACKEND_SUGGESTIONS = data.suggestions;
      //renderSuggestionsFromBackend();
      renderSuggestions();
    }

  } catch (err) {
    console.warn("No se pudieron cargar suggestions iniciales");
  }
});
</script>
