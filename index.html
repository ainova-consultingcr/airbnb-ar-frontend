function pickBestVoice(targetLang) {

  const voices = speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;

  const langPrefix = targetLang.split("-")[0]; // es / en

  // palabras comunes en voces femeninas
  const femaleHints = [
    "female",
    "woman",
    "zira",
    "sabina",
    "helena",
    "sofia",
    "paulina",
    "lucia",
    "maria"
  ];

  // 1️⃣ buscar voz femenina del idioma
  let voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix) &&
    femaleHints.some(h => v.name.toLowerCase().includes(h))
  );

  if (voice) return voice;

  // 2️⃣ fallback: cualquier voz del idioma
  voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix)
  );

  if (voice) return voice;

  // 3️⃣ fallback total
  return voices[0] || null;
}

function pickBestVoiceoriginal(lang) {
  const voices = window.speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;

  // Normalizar
  const short = (lang || "es").toLowerCase().split("-")[0]; // "es-CR" -> "es"

  // 1) Match exacto por lang completo
  let v = voices.find(v => v.lang && v.lang.toLowerCase() === (lang || "").toLowerCase());
  if (v) return v;

  // 2) Match por idioma base (es, en)
  const candidates = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith(short));

  if (candidates.length === 0) return null;

  // 3) Preferencias de español (evita voces raras si existen)
  if (short === "es") {
    const preferred = ["es-CR", "es-MX", "es-ES", "es-US"];
    for (const p of preferred) {
      const match = candidates.find(v => v.lang.toLowerCase() === p.toLowerCase());
      if (match) return match;
    }
  }

  // 4) Si no, usa la primera candidata
  return candidates[0];
}

function normalizeLang(lang) {
  if (!lang) return "es-ES";
  lang = lang.toLowerCase();

  if (lang.startsWith("es")) return "es-ES";
  if (lang.startsWith("en")) return "en-US";

  // fallback
  return "es-ES";
}

function pickBestVoice2(targetLang) {
  const voices = speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;

  const langPrefix = targetLang.split("-")[0]; // "es" o "en"

  // PRIORIDAD: Google voice en ese idioma
  let voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix) &&
    v.name.toLowerCase().includes("google")
  );
  if (voice) return voice;

  // SEGUNDA: Microsoft voice en ese idioma
  voice = voices.find(v =>
    v.lang.toLowerCase().startsWith(langPrefix) &&
    v.name.toLowerCase().includes("microsoft")
  );
  if (voice) return voice;

  // TERCERA: cualquier voz del idioma
  voice = voices.find(v => v.lang.toLowerCase().startsWith(langPrefix));
  if (voice) return voice;

  // fallback total
  return voices[0] || null;
}

function speak(text) {
  if (!text) return;

  // Cancelar lo anterior
  speechSynthesis.cancel();

  // Idioma según tu CURRENT_LANG detectado
  const targetLang = normalizeLang(CURRENT_LANG);
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = targetLang;

  const voice = pickBestVoice(targetLang);
  if (voice) utterance.voice = voice;

  utterance.rate = 0.95;
  utterance.pitch = 1;
  utterance.volume = 1;

    // 🔥 CUANDO TERMINA EL AUDIO
  utterance.onend = () => {
    closePanel(1500); // 👈 buffer elegante de 1.5s
  };

  speechSynthesis.speak(utterance);
}

  const icons = {

function typeWriterEffectoriginal(element, text, speed = 12) {
  let i = 0;
  element.setAttribute("value", "");

  const interval = setInterval(() => {
    i++;

    element.setAttribute("value", text.substring(0, i));

    if (i >= text.length) {
      clearInterval(interval);
    }
  }, speed);
}
function typeWriterEffect4(element, text, speed = 60) {

  const words = text.split(" ");
  let i = 0;
  let currentText = "";

  function typing() {

    if (i < words.length) {

      currentText += (i === 0 ? "" : " ") + words[i];

      element.setAttribute("value", currentText);

      i++;

      setTimeout(typing, speed);
    }

  }

  typing();
}
function typeWriterEffect(element, text, speed = 40) {

  const words = text.split(" ");
  let i = 0;
  let current = "";

  function typing() {

    if (i < words.length) {

      current += (i === 0 ? "" : " ") + words[i];

      element.setAttribute("troika-text", {
        value: current
      });

      i++;

      setTimeout(typing, speed);
    }

  }

  typing();

}
function typeWriterEffect3(element, text, speed = 60) {

  const words = text.split(" ");
  let i = 0;

  function typing() {

    if (i < words.length) {

      const current = element.getAttribute("value") || "";

      element.setAttribute(
        "value",
        current + (i === 0 ? "" : " ") + words[i]
      );

      i++;

      setTimeout(typing, speed);
    }

  }

  typing();
}

  const langKey = CURRENT_LANG.startsWith("en") ? "en" : "es";
  const list = BACKEND_SUGGESTIONS[langKey] || [];

  container.innerHTML = "";

  list.forEach((q) => {
    const btn = document.createElement("button");
    btn.className = "suggestion-btn";
    btn.textContent = q;

    btn.onclick = () => {
      const input = document.getElementById("questionInput");
      if (input) input.value = q;
      askAI();
    };

    container.appendChild(btn);
  });
}
